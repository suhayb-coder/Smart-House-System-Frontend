    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body,
      html {
        background-color: #010127 !important;
        color: #f1f5f9 !important;
      }
      .bg-surface-container-lowest,
      .bg-surface-container-low,
      .bg-surface-container,
      .bg-surface-container-high,
      .bg-surface-container-highest,
      .bg-surface,
      .bg-surface-bright,
      .bg-white,
      .glass-panel,
      aside,
      nav,
      form,
      table,
      .tab-content,
      #property-modal > div,
      #tenant-modal > div,
      #landlord-modal > div,
      #admin-prop-modal > div,
      #contact-modal > div {
        background-color: #080830 !important;
        color: #f1f5f9 !important;
        border-color: #1e1e50 !important;
      }
      header,
      .border-b,
      .border-t,
      .border,
      .border-outline-variant,
      .border-surface-variant {
        border-color: #1e1e50 !important;
      }
      body, html, p, span, h1, h2, h3, h4, h5, h6, label, legend, li, th, td,
      .text-on-surface, .text-on-surface-variant, .text-on-background,
      .text-secondary, .text-tertiary, .text-error,
      .text-slate-800, .text-slate-900, .text-slate-700, .text-slate-600,
      .text-gray-900, .text-gray-800, .text-gray-700, .text-gray-600,
      .text-zinc-800, .text-zinc-700, .text-zinc-600 {
        color: #e2e8f0 !important;
      }
      a, .text-primary, .text-primary-container, .text-link {
        color: #38bdf8 !important; /* Bright sky blue for dark mode readability */
      }
      a:hover {
        color: #7dd3fc !important;
      }
      .text-outline, .text-slate-500, .text-gray-500, .text-gray-400 {
        color: #94a3b8 !important;
      }
      input,
      select,
      textarea {
        background-color: #050522 !important;
        color: #ffffff !important;
        border-color: #1e1e50 !important;
      }
      input::placeholder,
      textarea::placeholder {
        color: #475569 !important;
      }
      tr:hover,
      .hover\:bg-surface-bright:hover,
      .hover\:bg-surface-container-low:hover,
      .hover\:bg-surface-container-high:hover {
        background-color: #12124e !important;
      }
      button {
        border-color: transparent !important;

  <body
    class="bg-surface-container-low min-h-screen flex items-center justify-center p-4"
  >
    <!-- Login Container -->
    <div
      class="bg-surface-container-lowest w-full max-w-md rounded-xl shadow-[0_4px_20px_rgba(51,65,85,0.08)] overflow-hidden"
    >
      <!-- Header / Logo Area -->
      <div class="pt-8 pb-6 px-8 text-center border-b border-surface-variant">
        <h1
          class="font-headline-md text-headline-md text-primary flex items-center justify-center gap-2"
        >
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >domain</span
          >
          Smart Housing
        </h1>
        <p class="mt-2 font-body-md text-body-md text-on-surface-variant">
          Secure Access Portal
        </p>
      </div>
      <!-- Form Area -->
      <div class="p-8">
        <form action="home.html" class="space-y-6" method="POST">
          <!-- Email Input -->
          <div>
            <label
              class="block font-label-md text-label-md text-on-surface mb-1"
              for="email"
              >Email Address</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline">mail</span>
              </div>
              <input
                class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors"
                id="email"
                name="email"
                placeholder="admin@smarthousing.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <!-- Password Input -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label
                class="block font-label-md text-label-md text-on-surface"
                for="password"
                >Password</label
              >
              <a
                class="font-label-sm text-label-sm text-primary hover:underline"
                href="resetPassword.html"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline">lock</span>
              </div>
              <input
                class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                <button
                  class="text-outline hover:text-on-surface-variant focus:outline-none"
                  type="button"
                >
                  <span class="material-symbols-outlined">visibility_off</span>
                </button>
              </div>
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center">
            <input
              class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest"
              id="remember-me"
              name="remember-me"
              type="checkbox"
            />
            <label
              class="ml-2 block font-body-md text-body-md text-on-surface-variant"
              for="remember-me"
            >
              Remember this device
            </label>
          </div>
          <!-- Submit Button -->
          <div>
            <button
              class="w-full flex justify-center items-center py-3 px-4 bg-[#0052CC] hover:bg-[#003d9b] text-white rounded font-label-md text-label-md transition-colors shadow-sm hover:shadow-[0_8px_30px_rgba(51,65,85,0.12)]"
              type="submit"
            >
              Sign In
              <span class="material-symbols-outlined ml-2 text-[20px]"
                >arrow_forward</span
              >
            </button>
          </div>
        </form>
      </div>
      <!-- Footer Area -->
      <div
        class="px-8 py-6 bg-surface border-t border-surface-variant text-center"
      >
        <p class="font-body-md text-body-md text-on-surface-variant">
          Need access?
          <a
            class="font-label-md text-label-md text-primary hover:underline"
            href="register.html"
            >Create an account</a
          >
        </p>
      </div>
    </div>
    <script>
      document
        .querySelector("form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const response = await fetch(
              "http://localhost:8080/api/auth/login",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ email, password }),
              },
            );

            if (response.ok) {
              const user = await response.json();
              localStorage.setItem("user", JSON.stringify(user));

              alert("Welcome back, " + user.fullName + "!");

              const role = (user.role || "").toUpperCase();
              if (role === "ADMIN") {
                window.location.href = "admin.html";
              } else if (role === "LANDLORD") {
                window.location.href = "landlord.html";
              } else {
                window.location.href = "tenant.html";
              }
            } else {
              const data = await response.json();
              alert("Error: " + (data.message || "Login failed"));
            }
          } catch (error) {
            console.error("Error during login:", error);
            alert("Unable to connect to the backend server.");
          }
        });
    </script>
    <style>
      body, html, p, span, h1, h2, h3, h4, h5, h6, label, legend, li, th, td,
      .text-on-surface, .text-on-surface-variant, .text-on-background,
      .text-secondary, .text-tertiary, .text-error,
      .text-slate-800, .text-slate-900, .text-slate-700, .text-slate-600,
      .text-gray-900, .text-gray-800, .text-gray-700, .text-gray-600,
      .text-zinc-800, .text-zinc-700, .text-zinc-600 {

      }

        color: #38bdf8 !important;
      }
      a:hover {
        color: #7dd3fc !important;
      }
      button, [type='button'], [type='submit'] {
        color: #ffffff !important;
      }
      [type='submit'], button[type='submit'] {
        background-color: #0052cc !important;
        color: #ffffff !important;
      }
      [type='submit']:hover, button[type='submit']:hover {
        background-color: #003d9b !important;
      }
    </style>
