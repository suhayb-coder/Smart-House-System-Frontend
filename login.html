<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanzi Home Apartment | Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230d9488' stroke='%230d9488' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'></path><polyline points='9 22 9 12 15 12 15 22'></polyline></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    },
                    colors: { 
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        accent: '#3b82f6'
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hero-overlay {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 58, 138, 0.7) 100%);
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col selection:bg-brand-500 selection:text-white">

    <!-- Navbar -->
    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-accent flex items-center justify-center text-white font-bold text-xl shadow-lg">ZH</div>
                    <a href="index.html" class="text-2xl font-display font-extrabold tracking-tight text-gray-900">
                        Zanzi<span class="text-brand-600">Home</span>
                    </a>
                </div>
                <div id="nav-right" class="flex space-x-6 items-center">
                    <a href="rooms.html" class="text-gray-600 hover:text-brand-600 font-medium transition-colors">Explore</a>
                    <!-- Populated by app.js -->
                    <a href="login.html" class="bg-gray-900 hover:bg-brand-600 text-white px-5 py-2.5 rounded-full font-medium transition-all duration-300 shadow-md hover:shadow-xl hover:-translate-y-0.5">Login / Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 pt-24 min-h-screen">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <img src="home1.jpg" alt="Modern Room" class="w-full h-full object-cover object-center animate-[scaleIn_20s_ease-out_forwards]" onerror="this.src='https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80'" />
            <div class="absolute inset-0 bg-gradient-to-br from-gray-900/80 to-brand-900/80 backdrop-blur-sm"></div>
        </div>

        <div class="relative z-10 max-w-md w-full bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8 sm:p-10 space-y-8 overflow-hidden transform transition-all animate-fade-in-up">
            <!-- Decorative gradient orb -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>

            <!-- Login Form -->
            <form id="login-form" class="relative z-20 space-y-6">
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-display font-extrabold text-white mb-2 tracking-tight">Welcome Back</h2>
                    <p class="text-gray-300 text-sm font-medium">Sign in to your account to continue</p>
                </div>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Email address</label>
                        <input type="email" id="login-email" required class="appearance-none block w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Password</label>
                        <input type="password" id="login-password" required class="appearance-none block w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-lg text-sm font-bold text-white bg-brand-500 hover:bg-brand-600 hover:shadow-brand-500/30 hover:shadow-2xl hover:-translate-y-0.5 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-brand-500">
                        Sign In
                    </button>
                </div>
                
                <div class="text-center text-sm pt-4">
                    <span class="text-gray-300">Don't have an account?</span>
                    <a href="#" id="show-register" class="font-bold text-brand-400 hover:text-white transition-colors ml-1 border-b border-transparent hover:border-white">Register here</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;" class="relative z-20 space-y-6">
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-display font-extrabold text-white mb-2 tracking-tight">Create Account</h2>
                    <p class="text-gray-300 text-sm font-medium">Join the Zanzi Home platform</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Full Name</label>
                        <input type="text" id="reg-name" required class="appearance-none block w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Email address</label>
                        <input type="email" id="reg-email" required class="appearance-none block w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Phone Number</label>
                        <input type="tel" id="reg-phone" required class="appearance-none block w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-200 mb-1.5 ml-1">Password</label>
                        <input type="password" id="reg-password" required class="appearance-none block w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white/10 focus:border-transparent sm:text-sm transition-all duration-300 shadow-inner">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-lg text-sm font-bold text-white bg-accent hover:bg-blue-600 hover:shadow-blue-500/30 hover:shadow-2xl hover:-translate-y-0.5 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-blue-500">
                        Create Account
                    </button>
                </div>
                
                <div class="text-center text-sm pt-4">
                    <span class="text-gray-300">Already have an account?</span>
                    <a href="#" id="show-login" class="font-bold text-accent hover:text-white transition-colors ml-1 border-b border-transparent hover:border-white">Sign in here</a>
                </div>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
