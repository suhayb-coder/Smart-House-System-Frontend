<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanzi Home Apartment | Rooms</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230d9488' stroke='%230d9488' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'></path><polyline points='9 22 9 12 15 12 15 22'></polyline></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    },
                    colors: { 
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        accent: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-accent flex items-center justify-center text-white font-bold text-xl shadow-lg">ZH</div>
                    <a href="index.html" class="text-2xl font-display font-extrabold tracking-tight text-gray-900">
                        Zanzi<span class="text-brand-600">Home</span>
                    </a>
                </div>
                <div id="nav-right" class="flex space-x-6 items-center">
                    <a href="rooms.html" class="text-gray-600 hover:text-brand-600 font-medium transition-colors">Explore</a>
                    <a href="login.html" class="bg-gray-900 hover:bg-brand-600 text-white px-5 py-2.5 rounded-full font-medium transition-all duration-300 shadow-md">Login / Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-24">
        <!-- Header & Search Section -->
        <section class="bg-slate-900 py-16 px-4 sm:px-6 lg:px-8 border-b border-gray-200 shadow-inner">
            <div class="max-w-4xl mx-auto text-center">
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-6">Find Your Perfect Room</h1>
                
                <!-- Search & Filter Bar -->
                <div class="bg-white p-4 rounded-2xl shadow-xl flex flex-col md:flex-row items-center gap-4 text-left">
                    <div class="flex-1 w-full relative">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="filter-location" placeholder="Search by location..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none">
                    </div>
                    <div class="flex-1 w-full">
                        <select id="filter-type" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-gray-600">
                            <option value="">Any Room Type</option>
                            <option value="single">Single Room</option>
                            <option value="master">Master Room</option>
                        </select>
                    </div>
                    <div class="flex-1 w-full">
                        <input type="number" id="filter-max-price" placeholder="Max Price ($)" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none">
                    </div>
                </div>
                
                <!-- Toggles -->
                <div class="mt-6 flex flex-wrap justify-center gap-6">
                    <label class="flex items-center text-sm font-medium text-slate-300 cursor-pointer hover:text-white transition-colors">
                        <input type="checkbox" id="filter-pets" class="mr-2 w-4 h-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500"> Pet Friendly
                    </label>
                    <label class="flex items-center text-sm font-medium text-slate-300 cursor-pointer hover:text-white transition-colors">
                        <input type="checkbox" id="filter-laundry" class="mr-2 w-4 h-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500"> In-Unit Laundry
                    </label>
                </div>
            </div>
        </section>

        <!-- Rooms Section -->
        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Rooms will be injected here by app.js -->
                <div class="col-span-full text-center text-gray-500 py-10">Loading rooms...</div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 pt-16 pb-8 border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="border-t border-gray-800 pt-8 flex justify-between items-center">
                <p class="text-gray-500 text-sm">&copy; 2026 Zanzi Home Apartment. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
